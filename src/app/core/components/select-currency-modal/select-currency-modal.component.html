<cdk-virtual-scroll-viewport itemSize="59" minBufferPx="900" maxBufferPx="1350">
    <ion-list lines="none">
        <ion-item class="item-interactive" [button]="true"
            [class.selected]="currency.value === selectedCurrency"
            *cdkVirtualFor="let currency of currencies; trackBy: trackByFn" (click)="currencySelected(currency.value)"
        >
            <ion-label>
                <h2>{{currency.title}}</h2>
            </ion-label>
        </ion-item>
    </ion-list>
</cdk-virtual-scroll-viewport>
