<ion-list class="people">
    <ion-item *ngFor="let member of viewMembers$ | async; trackBy: trackByFn" >
        <ion-checkbox slot="start" [value]="member.id" [checked]="member.checked" (ionChange)="checkedChange($any($event), member)"></ion-checkbox>
        <ion-avatar>
            <img src="assets/avatar.svg" />
        </ion-avatar>
        <ion-label>
            <h2>{{member.name}}</h2>
        </ion-label>
    </ion-item>
</ion-list>

<div class="action-button">
    <ion-buttons slot="end">
        <ion-button color="primary" (click)="close.emit()">Ok</ion-button>
    </ion-buttons>
</div>
