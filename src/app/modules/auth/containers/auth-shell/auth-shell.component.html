<ion-content>
    <div class="wrapper">
        <ion-list lines="none" class="ion-padding-top">
            <ion-item>
                <ion-text class="page-title"><h1>Sign in</h1></ion-text>
            </ion-item>
            <ion-item>
                <ms-control-wrapper [formControl]="email" [withAsyncValidators]="true" class="email-input">
                    <input class="group-name ms-input" [formControl]="email" placeholder="Email address">
                </ms-control-wrapper>
            </ion-item>

            <ion-item>
                <ion-button class="sign-in-btn email" size="default" (click)="continueWithEmail()">
                    <ion-icon slot="start" name="mail"></ion-icon>
                    Continue with email
                </ion-button>
            </ion-item>

            <ion-item class="divider">
                <hr />
                <span>OR</span>
                <hr />
            </ion-item>

            <ion-item>
                <ion-button class="sign-in-btn google" size="default" (click)="signInWithGoogle()">
                    <ion-icon slot="start" name="google"></ion-icon>
                    Sign in with Google
                </ion-button>
            </ion-item>
        </ion-list>
    </div>
</ion-content>
