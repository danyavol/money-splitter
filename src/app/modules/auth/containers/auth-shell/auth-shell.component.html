<ion-content>
    <div class="wrapper">
        <ion-list lines="none">
            <ion-item>
                <ion-text class="page-title"><h1>Sign in</h1></ion-text>
            </ion-item>
            <ion-item>
                <ms-control-wrapper [formControl]="email" [withAsyncValidators]="true" class="email-input">
                    <input class="ms-input" [formControl]="email" placeholder="Email address" type="email">
                </ms-control-wrapper>
            </ion-item>

            <ion-item>
                <ion-button class="sign-in-btn email font-title-m" size="default" (click)="continueWithEmail()">
                    <span class="material-symbols-rounded">mail</span>
                    Continue with email
                </ion-button>
            </ion-item>

            <ion-item class="divider">
                <hr />
                <span class="font-body-l">OR</span>
                <hr />
            </ion-item>

            <ion-item>
                <ion-button class="sign-in-btn google font-title-m" size="default" (click)="signInWithGoogle()">
                    <ion-icon slot="start" name="google"></ion-icon>
                    Sign in with Google
                </ion-button>
            </ion-item>
        </ion-list>
    </div>
</ion-content>
