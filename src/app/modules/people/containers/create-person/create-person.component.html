<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-button routerLink=".." routerDirection="back">
                <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Create Person</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>
    <app-person-form [form]="personForm"></app-person-form>

    <ion-list lines="none" class="ion-padding-top">
        <ion-item>
            <ion-button size="default" slot="end" (click)="createPerson()">
                <ion-icon slot="start" name="add-outline"></ion-icon>
                Create person
            </ion-button>
        </ion-item>
    </ion-list>
</ion-content>
