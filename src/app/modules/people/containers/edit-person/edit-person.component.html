<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <app-button variant="text" color="light" icon routerLink="/people" routerDirection="back">
                <span class="material-symbols-rounded">arrow_back</span>
            </app-button>
        </ion-buttons>
        <ion-title>Edit Person</ion-title>
        <ion-buttons slot="end">
            <app-button variant="text" color="danger" icon id="remove-person-confirm-modal">
                <span class="material-symbols-rounded not-filled">delete</span>
            </app-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <app-person-form [form]="personForm"></app-person-form>

    <ion-list lines="none" class="ion-padding-top">
        <ion-item>
            <app-button slot="end" (click)="savePerson()">
                <span class="material-symbols-rounded">add</span>
                Save person
            </app-button>
        </ion-item>
    </ion-list>
</ion-content>

<ion-modal trigger="remove-person-confirm-modal" class="modal" #confirmModal>
    <ng-template>
        <div class="modal-wrapper">
            <div class="modal-title">
                Are you sure you want to delete this person?
            </div>
            <div class="modal-buttons">
                <ion-button color="medium" (click)="confirmModal.dismiss()">Cancel</ion-button>
                <ion-button (click)="removePerson(confirmModal)">Yes</ion-button>
            </div>
        </div>
    </ng-template>
</ion-modal>
