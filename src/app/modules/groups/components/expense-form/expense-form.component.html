    название

    дата

    payers

    split with
 -->

<ion-list>
    <ion-item>
        <ion-input placeholder="Expense title"></ion-input>
    </ion-item>
    <ion-item>
        <ion-label>PLN</ion-label>
        <ion-input type="text" color="primary" inputmode="decimal" currencyMask [formControl]="control"></ion-input>
    </ion-item>
    <ion-item>
        <ion-datetime-button datetime="datetime"></ion-datetime-button>

        <ion-modal [keepContentsMounted]="true">
            <ng-template>
                <ion-datetime id="datetime" hourCycle="h23"></ion-datetime>
            </ng-template>
        </ion-modal>
    </ion-item>
</ion-list>
