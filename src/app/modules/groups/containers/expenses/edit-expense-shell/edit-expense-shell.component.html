<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-button routerLink="../.." routerDirection="back">
                <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Edit Expense</ion-title>
        <ion-buttons slot="end">
            <ion-button (click)="removeExpense()">
                <ion-icon slot="icon-only" name="trash-outline" color="danger"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <app-expense-form
        *ngIf="form"
        [form]="form"
        [members]="(members$ | async) || []"
        [currency]="currency$ | async"
    ></app-expense-form>

    <ion-list lines="none" class="ion-padding-top">
        <ion-item>
            <ion-button size="default" slot="end" (click)="saveExpense()">
                <ion-icon slot="start" name="save-outline"></ion-icon>
                Save expense
            </ion-button>
        </ion-item>
    </ion-list>
</ion-content>
