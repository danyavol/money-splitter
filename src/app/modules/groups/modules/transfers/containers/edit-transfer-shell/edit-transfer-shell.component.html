<ion-header>
    <ion-toolbar>
        <ion-buttons slot="start">
            <ion-button routerLink="../.." routerDirection="back">
                <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
            </ion-button>
        </ion-buttons>
        <ion-title>Edit Transfer</ion-title>
        <ion-buttons slot="end">
            <ion-button id="remove-transfer-confirm-modal">
                <ion-icon slot="icon-only" name="trash-outline" color="danger"></ion-icon>
            </ion-button>
        </ion-buttons>
    </ion-toolbar>
</ion-header>

<ion-content>
    <app-transfer-form
        *ngIf="currency$ | async as currency"
        [form]="form"
        [members$]="members$"
        [currency]="currency"
    ></app-transfer-form>

    <ion-list lines="none" class="ion-padding-top">
        <ion-item>
            <ion-button size="default" slot="end" (click)="saveTransfer()">
                <ion-icon slot="start" name="add-outline"></ion-icon>
                Save transfer
            </ion-button>
        </ion-item>
    </ion-list>
</ion-content>

<ion-modal trigger="remove-transfer-confirm-modal" class="modal" #confirmModal>
    <ng-template>
        <div class="modal-wrapper">
            <div class="modal-title">
                Are you sure you want to delete this transfer?
            </div>
            <div class="modal-buttons">
                <ion-button color="medium" (click)="confirmModal.dismiss()">Cancel</ion-button>
                <ion-button (click)="removeTransfer(confirmModal)">Yes</ion-button>
            </div>
        </div>
    </ng-template>
</ion-modal>
